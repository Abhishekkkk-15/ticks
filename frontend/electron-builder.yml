appId: com.ailearningworkspace.app
productName: AI Learning Workspace
directories:
  buildResources: build
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintcache,eslint.config.mjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
asarUnpack:
  - resources/**
win:
  executableName: ai-learning-workspace
  target:
    - zip
nsis:
  artifactName: ${name}-${version}-setup.${ext}
  shortcutName: ${productName}
  uninstallDisplayName: ${productName}
  createDesktopShortcut: always
mac:
  entitlementsInherit: build/entitlements.mac.plist
  extendInfo:
    - NSDocumentsFolderUsageDescription: Used to open and save notes and resources you choose to import.
    - NSDownloadsFolderUsageDescription: Used to open resources (PDFs, files) you choose to import from Downloads.
  notarize: false
dmg:
  artifactName: ${name}-${version}.${ext}
linux:
  target:
    - AppImage
    - snap
    - deb
  category: Utility
appImage:
  artifactName: ${name}-${version}.${ext}
npmRebuild: false
extraResources:
  - from: ../backend
    to: backend
    filter:
      - '**/*'
      - '!.venv/**/*'
      - '!__pycache__/**/*'
      - '!**/*.pyc'
